<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQuash</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">
    <nav class="navbar">
        <div class="logo">SmartQuash</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
  </button>
        <h1>SmartQuash Agencies</h1>
    <div class="container">
  <!-- Registration -->
  <h3>Register</h3>
  <label>Full name
  <input type="text" 
  id="username" 
  placeholder="Username">
</label>
  <label>Tel. no.
  <input 
  type="text" id="Tel. no." placeholder="Tel. no.">
  </label>
  <label>Referral Code
  <input type="text" id="referral" placeholder="Referral Code">
  </label>

  <button onclick="registerUser()">Register</button>
  </label>
</nav>
  <!-- Balance -->
  <div class="balance">
    Balance: Ksh <span id="balance">0</span>
  </div>

  <!-- Video Task -->
  <div class="task">
    <h3>Watch Video Task</h3>

    <button onclick="watchVideo()">
      Watch Video & Earn Ksh 10
    </button>
  </div>

  <!-- Trivia Task -->
  <div class="task">
    <h3>Trivia Question</h3>

    <p>When was the first computer invented?</p>
    <p></p>

    <button onclick="correctAnswer()">
      1940s
      1950s
    </button>

    <button onclick="wrongAnswer()">
      High Transfer Machine Language
    </button>
  </div>

</div>

</body>
</html>
